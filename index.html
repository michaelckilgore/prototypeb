<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUGAR HILL REPORTING STATION • RUSHVILLE, IN</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="dashboard">

  <div id="current-conditions" class="section">
    <h2>CURRENT CONDITIONS</h2>
    <div id="current-data">Temp: --° | Humidity: --%</div>
  </div>

  <div id="next-three-days" class="section">
    <h2>NEXT THREE DAYS</h2>
    <div class="forecast-day">Mon H:--° L:--°</div>
    <div class="forecast-day">Tue H:--° L:--°</div>
    <div class="forecast-day">Wed H:--° L:--°</div>
  </div>

  <div id="radar" class="section">
    <h2>RADAR IMAGE HERE</h2>
    <img id="radar-img" src="" alt="Radar" style="max-width:100%; max-height:100%;">
  </div>

  <div id="lightning" class="section">
    <h2>LIGHTNING DATA SUMMARY</h2>
    <div id="lightning-data">No Data</div>
  </div>

  <div id="barometric" class="section">
    <h2>BAROMETRIC PRESSURE TREND</h2>
    <canvas id="pressure-chart"></canvas>
  </div>

  <div id="rainfall" class="section">
    <h2>RAINFALL DATA</h2>
    <canvas id="rainfall-chart"></canvas>
  </div>

  <div id="indoor-weather" class="section">
    <h2>INDOOR WEATHER</h2>
    <div id="indoor-data">Temp: --° | Humidity: --%</div>
  </div>

  <footer>
    <div id="footer-logo">SH</div>
  </footer>

</div>

<script>
  // Populate NEXT THREE DAYS
  const forecast = [
    { day: 'Mon', high: 78, low: 62 },
    { day: 'Tue', high: 80, low: 64 },
    { day: 'Wed', high: 75, low: 60 }
  ];

  const forecastContainer = document.getElementById('next-three-days');
  const dayDivs = forecastContainer.querySelectorAll('.forecast-day');
  forecast.forEach((f, i) => {
    if(dayDivs[i]) {
      dayDivs[i].textContent = `${f.day} H:${f.high}° L:${f.low}°`;
    }
  });

  // Placeholder: Chart.js or other dynamic data scripts can go here
</script>
</body>
</html>
