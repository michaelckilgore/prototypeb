<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sugar Hill Reporting Station</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="screen">

<div class="title">
SUGAR HILL REPORTING STATION • RUSHVILLE, IN
</div>

<div class="warning">
⚠ TORNADO WARNING — TAKE COVER NOW
</div>

<div class="layout">

<!-- LEFT COLUMN -->

<div class="left">

<div class="panel current">

<div class="icon">
<img src="images/storm.svg">
</div>

<div class="temp">
72°
</div>

<div class="details">
<div>Dewpoint 61°</div>
<div>Humidity 68%</div>
<div>Pressure 30.01 ▲</div>
</div>

</div>


<div class="panel forecast">

<h3>Short Term Forecast</h3>

<div class="hours">

<div><img src="images/storm.svg"><br>7 PM<br>71°</div>
<div><img src="images/rain.svg"><br>8 PM<br>69°</div>
<div><img src="images/rain.svg"><br>9 PM<br>66°</div>
<div><img src="images/cloud.svg"><br>10 PM<br>64°</div>

</div>

</div>

</div>


<!-- RADAR -->

<div class="radar">

<img src="images/radar.jpg">

</div>


<!-- RIGHT COLUMN -->

<div class="right">

<div class="panel lightning">

<h3>Lightning Data</h3>

<svg viewBox="0 0 200 80">

<polyline
points="0,70 30,60 60,65 90,40 120,45 150,20 180,40 200,30"
fill="none"
stroke="#66ccff"
stroke-width="3"/>

</svg>

<div class="counts">

<div>Last Min<br><b>3</b></div>
<div>15 Min<br><b>28</b></div>
<div>Hour<br><b>85</b></div>
<div>Day<br><b>212</b></div>

</div>

</div>


<div class="panel rain">

<h3>Rainfall</h3>

<div class="rainstats">

<div>Daily<br><b>.15"</b></div>
<div>Rate<br><b>.08"/hr</b></div>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
