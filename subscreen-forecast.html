<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expanded Forecast</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body class="page-fade subscreen-body">
<div class="bg-scene" aria-hidden="true">
  <div class="bg-gradient"></div>
  <div class="bg-orb bg-orb-left"></div>
  <div class="bg-orb bg-orb-right"></div>
  <div class="bg-wave-layer bg-wave-back"></div>
  <div class="bg-wave-layer bg-wave-front"></div>
  <div class="bg-vignette"></div>
</div>

<div class="page-fade-overlay"></div>

<main class="forecast-screen-shell">
  <section class="subscreen-header-bar forecast-header-bar">
    <div class="forecast-header-left">
      <div class="forecast-station-kicker">Sugar Hill Reporting Station</div>
      <div class="forecast-title-row">
        <div class="forecast-header-title">Expanded Forecast</div>
        <div class="forecast-twinkle" aria-hidden="true"></div>
      </div>
    </div>
    <div id="forecast-clock" class="forecast-header-clock">--:--</div>
  </section>

  <section class="forecast-content-shell">
    <div class="forecast-period-list">
      <article class="forecast-period-card">
        <div class="forecast-period-icon-wrap">
          <img id="forecast-period-icon-1" class="forecast-period-icon" src="images/cloud.svg" alt="Forecast icon">
        </div>
        <div class="forecast-period-copy">
          <div class="forecast-period-top">
            <div id="forecast-period-name-1" class="forecast-period-name">Tonight</div>
            <div id="forecast-period-temp-1" class="forecast-period-temp">--</div>
          </div>
          <div id="forecast-period-text-1" class="forecast-period-text">Forecast loading...</div>
        </div>
      </article>

      <article class="forecast-period-card">
        <div class="forecast-period-icon-wrap">
          <img id="forecast-period-icon-2" class="forecast-period-icon" src="images/cloud.svg" alt="Forecast icon">
        </div>
        <div class="forecast-period-copy">
          <div class="forecast-period-top">
            <div id="forecast-period-name-2" class="forecast-period-name">Friday</div>
            <div id="forecast-period-temp-2" class="forecast-period-temp">--</div>
          </div>
          <div id="forecast-period-text-2" class="forecast-period-text"></div>
        </div>
      </article>

      <article class="forecast-period-card">
        <div class="forecast-period-icon-wrap">
          <img id="forecast-period-icon-3" class="forecast-period-icon" src="images/cloud.svg" alt="Forecast icon">
        </div>
        <div class="forecast-period-copy">
          <div class="forecast-period-top">
            <div id="forecast-period-name-3" class="forecast-period-name">Friday Night</div>
            <div id="forecast-period-temp-3" class="forecast-period-temp">--</div>
          </div>
          <div id="forecast-period-text-3" class="forecast-period-text"></div>
        </div>
      </article>

      <article class="forecast-period-card">
        <div class="forecast-period-icon-wrap">
          <img id="forecast-period-icon-4" class="forecast-period-icon" src="images/cloud.svg" alt="Forecast icon">
        </div>
        <div class="forecast-period-copy">
          <div class="forecast-period-top">
            <div id="forecast-period-name-4" class="forecast-period-name">Saturday</div>
            <div id="forecast-period-temp-4" class="forecast-period-temp">--</div>
          </div>
          <div id="forecast-period-text-4" class="forecast-period-text"></div>
        </div>
      </article>
    </div>

    <section class="forecast-seven-day-shell">
      <div class="forecast-seven-day-label">The 7-Day Forecast</div>
      <div class="forecast-seven-day-grid">
        <div id="seven-day-1" class="forecast-mini-card">
          <div class="forecast-mini-day">--</div>
          <img class="forecast-mini-icon" src="images/cloud.svg" alt="Forecast icon">
          <div class="forecast-mini-temps">--/--</div>
          <div class="forecast-mini-pop">--%</div>
        </div>
        <div id="seven-day-2" class="forecast-mini-card">
          <div class="forecast-mini-day">--</div>
          <img class="forecast-mini-icon" src="images/cloud.svg" alt="Forecast icon">
          <div class="forecast-mini-temps">--/--</div>
          <div class="forecast-mini-pop">--%</div>
        </div>
        <div id="seven-day-3" class="forecast-mini-card">
          <div class="forecast-mini-day">--</div>
          <img class="forecast-mini-icon" src="images/cloud.svg" alt="Forecast icon">
          <div class="forecast-mini-temps">--/--</div>
          <div class="forecast-mini-pop">--%</div>
        </div>
        <div id="seven-day-4" class="forecast-mini-card">
          <div class="forecast-mini-day">--</div>
          <img class="forecast-mini-icon" src="images/cloud.svg" alt="Forecast icon">
          <div class="forecast-mini-temps">--/--</div>
          <div class="forecast-mini-pop">--%</div>
        </div>
        <div id="seven-day-5" class="forecast-mini-card">
          <div class="forecast-mini-day">--</div>
          <img class="forecast-mini-icon" src="images/cloud.svg" alt="Forecast icon">
          <div class="forecast-mini-temps">--/--</div>
          <div class="forecast-mini-pop">--%</div>
        </div>
        <div id="seven-day-6" class="forecast-mini-card">
          <div class="forecast-mini-day">--</div>
          <img class="forecast-mini-icon" src="images/cloud.svg" alt="Forecast icon">
          <div class="forecast-mini-temps">--/--</div>
          <div class="forecast-mini-pop">--%</div>
        </div>
        <div id="seven-day-7" class="forecast-mini-card">
          <div class="forecast-mini-day">--</div>
          <img class="forecast-mini-icon" src="images/cloud.svg" alt="Forecast icon">
          <div class="forecast-mini-temps">--/--</div>
          <div class="forecast-mini-pop">--%</div>
        </div>
      </div>
      <div class="forecast-confidence-note">Forecast confidence decreases with time.</div>
    </section>

    <section class="subscreen-conditions-shell fast-wipe-shell">
      <div class="subscreen-conditions-title">Current Conditions</div>
      <div class="subscreen-conditions-window">
        <div id="subscreen-conditions-track" class="subscreen-conditions-track"></div>
      </div>
    </section>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
