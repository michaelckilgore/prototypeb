
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Current Conditions</title>
<link rel="stylesheet" href="style.css">

<style>
/* Forecast-style header reused for this subscreen */

.forecast-style-header{
  position:relative;
  height:140px;
  width:100%;
  overflow:hidden;
}

.forecast-style-header img.header-bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.forecast-style-logo{
  position:absolute;
  left:12px;
  top:10px;
  width:260px;
}

.forecast-style-title{
  position:absolute;
  left:290px;
  right:200px;
  top:0;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:clamp(26px,2.8vw,44px);
  font-weight:900;
  color:#ffffff;
}

.forecast-style-clock{
  position:absolute;
  right:28px;
  top:50%;
  transform:translateY(-50%);
  font-size:24px;
  font-weight:800;
  color:#ffffff;
  white-space:nowrap;
}
</style>

</head>

<body>

<header class="forecast-style-header">

<img class="header-bg" src="assets/header/subscreen-header.png" alt="">

<img class="forecast-style-logo"
     src="assets/logo/sugar-hill-logo.png"
     alt="Sugar Hill Weather Network">

<div class="forecast-style-title">
Current Conditions
</div>

<div id="subscreen-clock" class="forecast-style-clock">
--:--
</div>

</header>

<!-- existing page content remains below -->

</body>
</html>
