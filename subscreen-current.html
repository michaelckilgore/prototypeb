<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Current Conditions in Rushville</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body class="page-fade subscreen-body">
<div class="bg-scene" aria-hidden="true">
  <div class="bg-gradient"></div>
  <div class="bg-orb bg-orb-left"></div>
  <div class="bg-orb bg-orb-right"></div>
  <div class="bg-wave-layer bg-wave-back"></div>
  <div class="bg-wave-layer bg-wave-front"></div>
  <div class="bg-vignette"></div>
</div>

<div class="page-fade-overlay"></div>

<main class="subscreen-current-v2">
  <section class="subscreen-header-bar">
  <div class="subscreen-header-side subscreen-header-side-left">
    <img src="assets/logo/sugar-hill-logo.png" class="subscreen-header-logo" alt="Sugar Hill logo">
  </div>
  <div class="subscreen-header-title">Current Conditions</div>
  <div class="subscreen-header-side subscreen-header-side-right">
    <div id="subscreen-clock" class="subscreen-header-clock">--:--</div>
  </div>
</section>

  <section class="subscreen-main-grid">
    <section class="sub-panel graph-panel-left">
      <div class="sub-panel-title">TEMPERATURE LAST 24 HOURS</div>
      <div class="sub-graph-shell">
        <svg id="temp-graph" class="graph-svg" viewBox="0 0 860 360" preserveAspectRatio="none"></svg>
      </div>
    </section>

    <section class="sub-panel center-conditions-panel">
      <div class="sub-center-block">
        <div class="temp-range-top">
          <div class="range-label">HIGH</div>
          <div id="ring-high-temp" class="range-value">--°</div>
        </div>

        <div class="temp-ring-wrap">
          <svg id="temp-ring-svg" class="temp-ring-svg" viewBox="0 0 360 360" preserveAspectRatio="xMidYMid meet"></svg>
          <div class="temp-ring-center">
            <div class="ring-temp-row">
              <div id="ring-current-temp" class="ring-current-temp">--°</div>
              <div id="ring-temp-trend" class="ring-temp-trend" aria-hidden="true"></div>
            </div>
            <div id="ring-feels-like" class="ring-feels-like">Feels Like --°</div>
          </div>
        </div>

        <div class="temp-range-bottom">
          <div class="range-label">LOW</div>
          <div id="ring-low-temp" class="range-value">--°</div>
        </div>

        <div class="center-metrics">
          <div class="center-metric">
            <div class="center-metric-label">Dew Point</div>
            <div id="center-dew" class="center-metric-value">--°</div>
          </div>
          <div class="center-metric">
            <div class="center-metric-label">Humidity</div>
            <div id="center-humidity" class="center-metric-value">--%</div>
          </div>
          <div class="center-metric">
            <div class="center-metric-label">Wind</div>
            <div id="center-wind" class="center-metric-value">--</div>
          </div>
          <div class="center-metric">
            <div class="center-metric-label">Pressure</div>
            <div id="center-pressure" class="center-metric-value">--</div>
          </div>
        </div>
      </div>
    </section>

    <section class="sub-panel graph-panel-right">
      <div class="sub-panel-title">
        <span>PRESSURE LAST 6 HOURS</span>
        <span id="subscreen-pressure-trend" class="subscreen-pressure-trend"></span>
      </div>
      <div class="sub-graph-shell">
        <svg id="pressure-graph" class="graph-svg" viewBox="0 0 860 360" preserveAspectRatio="none"></svg>
      </div>
    </section>
  </section>

  <section class="subscreen-conditions-shell fast-wipe-shell">
    <div class="subscreen-conditions-title">CURRENT CONDITIONS IN RUSHVILLE</div>
    <div class="subscreen-conditions-window">
      <div id="subscreen-conditions-track" class="subscreen-conditions-track"></div>
    </div>
  </section>

  <section id="subscreen-alert-ribbon" class="subscreen-alert-ribbon" style="display:none;">
    <div id="subscreen-alert-text" class="subscreen-alert-text"></div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
