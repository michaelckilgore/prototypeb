<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Local Severe Weather</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<style>
.severe-screen-shell{
  min-height:calc(100vh - 32px);
  display:grid;
  grid-template-rows:auto 1fr;
  gap:12px;
}
.severe-art-header{
  position:relative;
  height:140px;
  overflow:hidden;
  border-radius:18px;
  box-shadow:var(--shadow), var(--glow);
}
.severe-art-header-bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
.severe-art-header-logo{
  position:absolute;
  left:12px;
  top:8px;
  width:250px;
  height:auto;
  z-index:2;
}
.severe-art-header-title{
  position:absolute;
  left:286px;
  right:190px;
  top:0;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:clamp(26px, 2.8vw, 44px);
  line-height:1.04;
  font-weight:900;
  letter-spacing:.4px;
  color:#ffffff;
  text-shadow:0 0 10px rgba(255,255,255,.14);
  z-index:2;
}
.severe-art-header-clock{
  position:absolute;
  right:28px;
  top:50%;
  transform:translateY(-50%);
  font-size:24px;
  line-height:1;
  font-weight:800;
  letter-spacing:.4px;
  color:#ffffff;
  white-space:nowrap;
  z-index:2;
}
.severe-module{
  position:relative;
  overflow:hidden;
  border:1px solid var(--line-soft);
  border-radius:18px;
  box-shadow:var(--shadow), var(--glow);
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.08), transparent 24%),
    radial-gradient(circle at 72% 36%, rgba(255,255,255,.07), transparent 28%),
    radial-gradient(circle at 50% 72%, rgba(255,255,255,.05), transparent 26%),
    linear-gradient(180deg, #1a2234 0%, #202d44 28%, #1a2438 60%, #111827 100%);
}
.severe-module::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse at 25% 35%, rgba(255,255,255,.18), rgba(255,255,255,0) 38%),
    radial-gradient(ellipse at 68% 44%, rgba(255,255,255,.12), rgba(255,255,255,0) 34%),
    radial-gradient(ellipse at 48% 72%, rgba(255,255,255,.10), rgba(255,255,255,0) 32%);
  filter:blur(16px);
  opacity:.55;
  pointer-events:none;
}
.severe-module-inner{
  position:relative;
  z-index:1;
  height:100%;
  padding:22px 28px 24px;
  display:grid;
  grid-template-rows:auto auto auto 1fr;
  gap:14px;
}
.severe-watch-type{
  text-align:center;
  font-size:clamp(34px, 4.2vw, 64px);
  line-height:1;
  font-weight:900;
  letter-spacing:.6px;
  text-transform:uppercase;
  color:#ff3838;
  text-shadow:0 0 12px rgba(255,56,56,.20);
}
.severe-watch-type.severe-thunderstorm{
  color:var(--gold);
  text-shadow:0 0 12px rgba(244,191,52,.18);
}
.severe-expire{
  text-align:center;
  font-size:clamp(24px, 3vw, 44px);
  line-height:1.05;
  font-weight:900;
  color:#ffffff;
}
.severe-areas{
  display:grid;
  gap:10px;
  justify-items:center;
  align-content:start;
}
.severe-area-line{
  width:min(980px, 90%);
  padding:8px 10px;
  text-align:center;
  font-size:clamp(22px, 2.8vw, 46px);
  line-height:1.04;
  font-weight:900;
  color:#f5fbff;
  border-top:1px solid rgba(255,255,255,.12);
  border-bottom:1px solid rgba(255,255,255,.12);
  background:linear-gradient(180deg, rgba(5,16,31,.16), rgba(255,255,255,.02), rgba(5,16,31,.16));
}
.severe-threats-wrap{
  align-self:end;
  width:min(980px, 94%);
  justify-self:center;
  display:grid;
  gap:12px;
}
.severe-threats-title{
  text-align:center;
  font-size:clamp(24px, 3vw, 42px);
  line-height:1;
  font-weight:900;
  color:var(--gold);
  text-transform:uppercase;
}
.severe-threat-list{
  display:grid;
  gap:10px;
}
.severe-threat{
  display:grid;
  grid-template-columns:26px 1fr;
  gap:12px;
  align-items:start;
  font-size:clamp(20px, 2.2vw, 34px);
  line-height:1.1;
  font-weight:800;
  color:#f6fbff;
}
.severe-bullet{
  color:var(--gold);
  font-size:1.15em;
  line-height:.9;
}
.severe-prototype-note{
  position:absolute;
  left:22px;
  bottom:14px;
  font-size:12px;
  font-weight:700;
  letter-spacing:.4px;
  color:rgba(220,235,255,.72);
}
@media (max-width: 1200px){
  .severe-art-header{ height:124px; }
  .severe-art-header-logo{ width:220px; left:10px; top:10px; }
  .severe-art-header-title{ left:244px; right:170px; font-size:clamp(22px, 2.5vw, 36px); }
  .severe-watch-type{ font-size:clamp(30px, 4vw, 52px); }
  .severe-expire{ font-size:clamp(22px, 2.8vw, 36px); }
}
@media (max-width: 900px){
  .severe-art-header{ height:106px; }
  .severe-art-header-logo{ width:160px; left:8px; top:10px; }
  .severe-art-header-title{ left:176px; right:120px; font-size:clamp(18px, 3vw, 26px); }
  .severe-art-header-clock{ right:14px; font-size:18px; }
  .severe-module-inner{ padding:18px 16px 22px; }
  .severe-area-line{ width:100%; }
  .severe-threats-wrap{ width:100%; }
}
</style>
</head>
<body class="page-fade subscreen-body">
<div class="bg-scene" aria-hidden="true">
  <div class="bg-gradient"></div>
  <div class="bg-orb bg-orb-left"></div>
  <div class="bg-orb bg-orb-right"></div>
  <div class="bg-vignette"></div>
</div>
<div class="page-fade-overlay"></div>
<main class="severe-screen-shell">
  <section class="severe-art-header" aria-label="Local Severe Weather Header">
    <img class="severe-art-header-bg" src="assets/header/subscreen-header.png" alt="">
    <img class="severe-art-header-logo" src="assets/logo/sugar-hill-logo.png" alt="Sugar Hill logo">
    <div class="severe-art-header-title">Local Severe Weather</div>
    <div id="subscreen-clock" class="severe-art-header-clock">--:--</div>
  </section>

  <section class="severe-module">
    <div class="severe-module-inner">
      <div class="severe-watch-type">Tornado Watch #24</div>
      <div class="severe-expire">Until 11:00 PM CST</div>

      <div class="severe-areas">
        <div class="severe-area-line">Western Arkansas</div>
        <div class="severe-area-line">Southeast Oklahoma</div>
        <div class="severe-area-line">North Central Texas</div>
      </div>

      <div class="severe-threats-wrap">
        <div class="severe-threats-title">Threats</div>
        <div class="severe-threat-list">
          <div class="severe-threat"><span class="severe-bullet">•</span><span>70 MPH wind gusts likely</span></div>
          <div class="severe-threat"><span class="severe-bullet">•</span><span>Large hail to 1.5&quot; likely</span></div>
          <div class="severe-threat"><span class="severe-bullet">•</span><span>A tornado or two possible</span></div>
        </div>
      </div>
    </div>
    <div class="severe-prototype-note">Prototype sample data for rotation testing.</div>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
