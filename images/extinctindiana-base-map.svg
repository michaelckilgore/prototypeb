<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
<style>
.state-fill{fill:rgba(18,40,75,.35);}
.state-border{stroke:#7be7ff;stroke-width:3;fill:none;}
.county{stroke:#7be7ff;stroke-width:1;opacity:.15;fill:none;}
.lake{fill:#7be7ff;opacity:.15;}
.river{stroke:#7be7ff;stroke-width:2;opacity:.35;fill:none;}
</style>

<!-- Lake Michigan -->
<path class="lake"
d="M260 70
C240 120 245 180 260 240
C270 290 270 330 260 370
L350 370
L350 90
Z"/>

<!-- Indiana Shape -->
<path class="state-fill"
d="
M350 90
L530 90
L545 230
L555 370
L555 530
L520 560
L500 600
L420 610
L350 590
Z"/>

<path class="state-border"
d="
M350 90
L530 90
L545 230
L555 370
L555 530
L520 560
L500 600
L420 610
L350 590
Z"/>

<!-- Ohio River -->
<path class="river"
d="
M350 590
C380 600 420 610 460 605
C500 600 520 580 555 530
"/>

<g class="county">
<line x1="390" y1="100" x2="390" y2="600"/>
<line x1="430" y1="100" x2="430" y2="610"/>
<line x1="470" y1="100" x2="470" y2="605"/>
<line x1="510" y1="100" x2="510" y2="570"/>

<line x1="350" y1="150" x2="540" y2="150"/>
<line x1="350" y1="200" x2="540" y2="200"/>
<line x1="350" y1="250" x2="545" y2="250"/>
<line x1="350" y1="300" x2="550" y2="300"/>
<line x1="350" y1="350" x2="555" y2="350"/>
<line x1="350" y1="400" x2="555" y2="400"/>
<line x1="350" y1="450" x2="555" y2="450"/>
<line x1="350" y1="500" x2="555" y2="500"/>
</g>
</svg>
