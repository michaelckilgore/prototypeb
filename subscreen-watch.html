<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Watch Display</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --storm-bg:#0d1628;
    --storm-bg-2:#101c32;
    --panel:rgba(8,14,24,0.54);
    --panel-border:rgba(255,255,255,0.18);
    --panel-shadow:0 18px 34px rgba(0,0,0,0.45);
    --gold:#f3d26f;
    --text:#f6f9ff;
    --muted:#c6d2e8;
    --tornado1:#ff3838;
    --tornado2:#bf0000;
    --tornado3:#760000;
    --severe1:#ffb22b;
    --severe2:#cc7600;
    --severe3:#7a4400;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 50% 0%, rgba(124,151,202,0.24), transparent 35%),
      linear-gradient(180deg, #24344f 0%, #1a2740 38%, #111c31 72%, #0b1220 100%);
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 50% 78%, rgba(255,255,255,0.06), transparent 20%),
      linear-gradient(180deg, rgba(255,255,255,0.04), transparent 18%),
      radial-gradient(circle at 50% 100%, rgba(255,255,255,0.10), transparent 12%);
    pointer-events:none;
    opacity:0.95;
  }

  .storm-bg{
    position:fixed;
    inset:0;
    background:
      linear-gradient(180deg, rgba(11,17,30,0.20), rgba(11,17,30,0.20)),
      url("images/notradar.jpg") center center / cover no-repeat;
    filter:brightness(0.60) saturate(0.75) blur(1px);
    transform:scale(1.03);
    z-index:-2;
  }

  .storm-overlay{
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at center, rgba(0,0,0,0.04) 34%, rgba(0,0,0,0.34) 100%),
      linear-gradient(180deg, rgba(8,10,14,0.16), rgba(8,10,14,0.42));
    z-index:-1;
  }

  .screen{
    width:100%;
    height:100%;
    display:grid;
    grid-template-rows:94px 1fr 56px;
    gap:12px;
    padding:14px 16px 12px;
  }

  .header{
    display:grid;
    grid-template-columns:250px 1fr 240px;
    align-items:stretch;
    gap:14px;
  }

  .header-logo-wrap,
  .header-clock-wrap,
  .header-banner{
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.14);
    box-shadow:var(--panel-shadow);
    overflow:hidden;
  }

  .header-logo-wrap,
  .header-clock-wrap{
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(180deg, rgba(10,18,30,0.88), rgba(12,20,35,0.84));
    backdrop-filter:blur(2px);
  }

  .header-logo{
    max-width:210px;
    max-height:72px;
    width:auto;
    height:auto;
    display:block;
  }

  .header-clock{
    font-size:34px;
    font-weight:900;
    color:#ffffff;
    letter-spacing:0.5px;
    text-shadow:0 3px 10px rgba(0,0,0,0.45);
    white-space:nowrap;
  }

  .header-banner{
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 20px;
    color:#ffffff;
    background:linear-gradient(180deg, var(--banner1), var(--banner2) 58%, var(--banner3));
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.24),
      inset 0 -2px 0 rgba(0,0,0,0.25),
      var(--panel-shadow);
  }

  .header-banner-text{
    font-size:52px;
    font-weight:900;
    letter-spacing:1.1px;
    text-shadow:0 3px 12px rgba(0,0,0,0.45);
    line-height:1;
  }

  .content{
    display:grid;
    grid-template-columns:minmax(0, 1.62fr) minmax(360px, 0.78fr);
    gap:18px;
    min-height:0;
  }

  .panel{
    min-height:0;
    border-radius:14px;
    border:1px solid var(--panel-border);
    background:var(--panel);
    box-shadow:var(--panel-shadow);
    backdrop-filter:blur(2px);
  }

  .map-panel{
    padding:12px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .map-frame{
    width:100%;
    height:100%;
    position:relative;
    border-radius:10px;
    overflow:hidden;
    border:2px solid rgba(255,255,255,0.78);
    background:linear-gradient(180deg, rgba(20,27,40,0.84), rgba(9,15,25,0.88));
    box-shadow:
      0 14px 34px rgba(0,0,0,0.62),
      inset 0 1px 0 rgba(255,255,255,0.22);
  }

  .map-frame img,
  .map-fallback{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
  }

  .map-frame img{
    object-fit:contain;
    background:#0b1120;
    opacity:0;
    transition:opacity 0.55s ease;
  }

  .map-frame img.loaded{
    opacity:1;
  }

  .map-fallback{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:60px 40px;
    text-align:center;
    background:
      radial-gradient(circle at center, rgba(255,255,255,0.04), transparent 45%),
      linear-gradient(180deg, rgba(20,28,42,0.92), rgba(10,16,26,0.92));
  }

  .map-fallback-title{
    font-size:48px;
    font-weight:900;
    line-height:1.08;
    color:#ffffff;
    text-shadow:0 2px 10px rgba(0,0,0,0.45);
  }

  .map-fallback-subtitle{
    margin-top:22px;
    font-size:42px;
    font-weight:800;
    line-height:1.15;
    color:#dbe6f8;
  }

  .info-panel{
    padding:18px 18px 16px;
    display:grid;
    grid-template-rows:auto auto 1fr auto;
    gap:14px;
  }

  .info-card{
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.10);
    background:linear-gradient(180deg, rgba(8,14,24,0.56), rgba(8,14,24,0.44));
    padding:16px 18px;
  }

  .info-heading{
    color:var(--gold);
    font-size:26px;
    font-weight:900;
    letter-spacing:0.8px;
    margin-bottom:10px;
    text-transform:uppercase;
    text-shadow:0 2px 8px rgba(0,0,0,0.34);
  }

  .threat-list,
  .area-list{
    list-style:none;
    margin:0;
    padding:0;
  }

  .threat-list li,
  .area-list li{
    display:flex;
    align-items:flex-start;
    gap:14px;
  }

  .threat-list li + li,
  .area-list li + li{
    margin-top:12px;
  }

  .threat-bullet,
  .area-bullet{
    width:17px;
    height:17px;
    border-radius:50%;
    flex:0 0 17px;
    margin-top:10px;
    box-shadow:0 0 10px rgba(255,255,255,0.12);
  }

  .threat-bullet.tornado{ background:#ff3434; }
  .threat-bullet.hail{ background:#ff9f1e; }
  .threat-bullet.wind{ background:#ffd447; }
  .threat-bullet.default{ background:#8eb3d8; }
  .area-bullet{ background:rgba(243,210,111,0.78); width:10px; height:10px; flex-basis:10px; margin-top:12px; }

  .threat-text,
  .area-text{
    font-size:34px;
    line-height:1.18;
    font-weight:800;
    color:#ffffff;
    text-shadow:0 2px 8px rgba(0,0,0,0.34);
  }

  .area-text{ font-size:30px; }

  .valid-wrap{
    text-align:center;
    align-self:center;
  }

  .valid-text{
    font-size:34px;
    font-weight:900;
    color:var(--gold);
    text-shadow:0 2px 10px rgba(0,0,0,0.38);
  }

  .source-text{
    margin-top:6px;
    color:#d5dfef;
    font-size:20px;
    font-weight:700;
    letter-spacing:0.4px;
  }

  .footer{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.12);
    background:linear-gradient(180deg, rgba(10,18,30,0.64), rgba(10,18,30,0.50));
    box-shadow:var(--panel-shadow);
    color:#d7e1f3;
    font-size:21px;
    font-weight:700;
    letter-spacing:0.3px;
    text-align:center;
  }

  .theme-tornado{
    --banner1:var(--tornado1);
    --banner2:var(--tornado2);
    --banner3:var(--tornado3);
  }

  .theme-severe{
    --banner1:var(--severe1);
    --banner2:var(--severe2);
    --banner3:var(--severe3);
  }
</style>
</head>
<body class="theme-tornado">
<div class="storm-bg"></div>
<div class="storm-overlay"></div>
<div class="screen">
  <div class="header">
    <div class="header-logo-wrap">
      <img class="header-logo" src="assets/logo/sugar-hill-logo.png" alt="Sugar Hill Weather logo">
    </div>
    <div class="header-banner">
      <div id="watch-banner-text" class="header-banner-text">LOADING WATCH...</div>
    </div>
    <div class="header-clock-wrap">
      <div id="watch-clock" class="header-clock">--:--</div>
    </div>
  </div>

  <div class="content">
    <div class="panel map-panel">
      <div class="map-frame">
        <img id="watch-map" alt="Storm Prediction Center watch map">
        <div id="map-fallback" class="map-fallback">
          <div class="map-fallback-title">Storm Prediction Center Map</div>
          <div class="map-fallback-subtitle">Will Be Available Shortly</div>
        </div>
      </div>
    </div>

    <div class="panel info-panel">
      <div class="info-card">
        <div class="info-heading">Primary Threats</div>
        <ul id="primary-threats" class="threat-list"></ul>
      </div>

      <div class="info-card">
        <div class="info-heading">Portions Of</div>
        <ul id="watch-areas" class="area-list"></ul>
      </div>

      <div></div>

      <div class="valid-wrap">
        <div id="valid-until" class="valid-text">Valid Until --</div>
        <div class="source-text">Storm Prediction Center</div>
      </div>
    </div>
  </div>

  <div class="footer">Live watch screen returns to the forecast after its dwell time.</div>
</div>

<script>
  const SCREEN_ROTATE_MS = 5000;
  const MAP_RETRY_MS = 30000;
  let mapRetryTimer = null;
  let activeMapUrl = "";

  function updateClock() {
    const now = new Date();
    const str = now.toLocaleTimeString([], {
      hour: "numeric",
      minute: "2-digit",
      hour12: true,
      timeZoneName: "short"
    });
    document.getElementById("watch-clock").textContent = str;
  }

  function padWatchNumber(value) {
    return String(value).padStart(4, "0");
  }

  function defaultThreats(type) {
    const name = String(type || "").toLowerCase();
    if (name.includes("severe thunderstorm")) {
      return [
        { text: "Damaging Winds", tone: "wind" },
        { text: "Large Hail", tone: "hail" },
        { text: "Isolated Tornadoes", tone: "tornado" }
      ];
    }
    return [
      { text: "Tornadoes", tone: "tornado" },
      { text: "Large Hail", tone: "hail" },
      { text: "Damaging Winds", tone: "wind" }
    ];
  }

  function toneForThreat(text) {
    const value = String(text || "").toLowerCase();
    if (value.includes("tornado")) return "tornado";
    if (value.includes("hail")) return "hail";
    if (value.includes("wind")) return "wind";
    return "default";
  }

  function renderThreats(items, type) {
    const list = document.getElementById("primary-threats");
    const threats = Array.isArray(items) && items.length
      ? items.map((item) => typeof item === "string" ? { text: item, tone: toneForThreat(item) } : item)
      : defaultThreats(type);

    list.innerHTML = threats.map((item) => {
      const text = String(item.text || item || "").trim();
      const tone = String(item.tone || toneForThreat(text));
      return `<li><span class="threat-bullet ${tone}"></span><span class="threat-text">${escapeHtml(text)}</span></li>`;
    }).join("");
  }

  function normalizeAreaLines(input) {
    if (!Array.isArray(input) || !input.length) {
      return ["The Watch Area"];
    }
    return input
      .map((item) => String(item || "").replace(/\s+/g, " ").trim())
      .filter(Boolean)
      .slice(0, 4);
  }

  function renderAreas(items) {
    const lines = normalizeAreaLines(items);
    const list = document.getElementById("watch-areas");
    list.innerHTML = lines.map((line) => `<li><span class="area-bullet"></span><span class="area-text">${escapeHtml(line.toUpperCase())}</span></li>`).join("");
  }

  function formatValidText(label) {
    return label ? `Valid Until ${label}` : "Valid Until --";
  }

  function applyTheme(type) {
    const body = document.body;
    if (String(type || "").toLowerCase().includes("severe thunderstorm")) {
      body.classList.remove("theme-tornado");
      body.classList.add("theme-severe");
      return;
    }
    body.classList.remove("theme-severe");
    body.classList.add("theme-tornado");
  }

  function setBanner(type, number) {
    const safeType = String(type || "Watch").toUpperCase();
    document.getElementById("watch-banner-text").textContent = `${safeType} #${number}`;
  }

  function showMapFallback() {
    document.getElementById("map-fallback").style.display = "flex";
  }

  function hideMapFallback() {
    document.getElementById("map-fallback").style.display = "none";
  }

  function scheduleMapRetry() {
    window.clearTimeout(mapRetryTimer);
    if (!activeMapUrl) return;
    mapRetryTimer = window.setTimeout(() => {
      const map = document.getElementById("watch-map");
      map.classList.remove("loaded");
      map.src = `${activeMapUrl}${activeMapUrl.includes("?") ? "&" : "?"}t=${Date.now()}`;
    }, MAP_RETRY_MS);
  }

  function loadMap(url) {
    const map = document.getElementById("watch-map");
    activeMapUrl = url;
    showMapFallback();
    map.classList.remove("loaded");
    map.onload = () => {
      hideMapFallback();
      map.classList.add("loaded");
      window.clearTimeout(mapRetryTimer);
    };
    map.onerror = () => {
      showMapFallback();
      scheduleMapRetry();
    };
    map.src = `${url}${url.includes("?") ? "&" : "?"}t=${Date.now()}`;
  }

  function fallbackMapUrl(number) {
    return `https://www.spc.noaa.gov/products/watch/ww${padWatchNumber(number)}_overview_big.gif`;
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  async function fetchWatchDetail(number) {
    try {
      const response = await fetch("http://localhost:3000/api/spc-watches", { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const json = await response.json();
      const details = Array.isArray(json?.watchDetails) ? json.watchDetails : [];
      return details.find((item) => Number(item?.number) === Number(number)) || null;
    } catch (err) {
      console.error("SPC watch detail lookup failed:", err);
      return null;
    }
  }

  async function initWatch() {
    const params = new URLSearchParams(window.location.search);
    const watch = params.get("watch");

    if (!watch) {
      document.getElementById("watch-banner-text").textContent = "NO WATCH NUMBER";
      renderThreats([], "Tornado Watch");
      renderAreas(["Watch number missing"]);
      document.getElementById("valid-until").textContent = "Valid Until --";
      showMapFallback();
      return;
    }

    const detail = await fetchWatchDetail(watch);
    const type = detail?.type || "Tornado Watch";
    const mapUrl = detail?.mapUrl || fallbackMapUrl(watch);

    applyTheme(type);
    setBanner(type, watch);
    renderThreats(detail?.primaryThreats, type);
    renderAreas(detail?.areas);
    document.getElementById("valid-until").textContent = formatValidText(detail?.expiresLabel || detail?.expiresDisplay || "--");
    loadMap(mapUrl);
  }

  updateClock();
  initWatch();
  window.setInterval(updateClock, 1000);
  window.setTimeout(() => {
    window.location.href = "subscreen-forecast.html";
  }, SCREEN_ROTATE_MS);
</script>
</body>
</html>
