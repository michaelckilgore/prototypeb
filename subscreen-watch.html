
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch Display</title>
<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.header{
    background:#111;
    border-bottom:4px solid #ffd400;
    padding:20px;
    text-align:center;
}

.header h1{
    margin:0;
    font-size:48px;
    color:#ffd400;
}

.header h2{
    margin:6px 0 0 0;
    font-size:28px;
    font-weight:normal;
}

.container{
    display:flex;
    height:calc(100vh - 120px);
}

.map{
    flex:2;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.map img{
    max-width:100%;
    max-height:100%;
}

.info{
    flex:1;
    padding:30px;
}

.section{
    margin-bottom:30px;
}

.section-title{
    color:#ffd400;
    font-size:28px;
    margin-bottom:10px;
}

ul{
    font-size:22px;
    line-height:1.4;
}

.sample{
    position:absolute;
    top:10px;
    right:20px;
    color:#ff6666;
    font-size:18px;
}
</style>
</head>

<body>

<div class="sample">WATCH DISPLAY</div>

<div class="header">
<h1 id="watchTitle">WATCH</h1>
<h2 id="watchSubtitle">Loading...</h2>
</div>

<div class="container">

<div class="map">
<img id="watchMap">
</div>

<div class="info">

<div class="section">
<div class="section-title">SOURCE</div>
<div>Storm Prediction Center</div>
</div>

<div class="section">
<div class="section-title">NOTE</div>
<div>This screen is dynamically generated from the watch number.</div>
</div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const watchNumber = params.get("watch");

if(watchNumber){

    const padded = watchNumber.padStart(4,"0");

    const mapURL =
        "https://www.spc.noaa.gov/products/watch/ww" +
        padded +
        "_overview_big.gif";

    document.getElementById("watchMap").src = mapURL;

    document.getElementById("watchTitle").innerText =
        "WATCH #" + watchNumber;

    document.getElementById("watchSubtitle").innerText =
        "Storm Prediction Center";

}

</script>

</body>
</html>
