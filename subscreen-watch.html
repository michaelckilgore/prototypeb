
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SPC Watch</title>

<style>

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    overflow:hidden;
}

#header{
    position:absolute;
    top:12px;
    left:20px;
    font-size:22px;
    font-weight:bold;
}

#clock{
    position:absolute;
    top:12px;
    right:20px;
    font-size:18px;
}

#watchNumber{
    position:absolute;
    top:60px;
    left:20px;
    font-size:38px;
    font-weight:bold;
}

#mapContainer{
    position:absolute;
    top:120px;
    left:0;
    right:0;
    bottom:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

#mapContainer img{
    max-width:95%;
    max-height:95%;
}

#pending{
    font-size:28px;
    text-align:center;
    line-height:1.4;
}

</style>
</head>

<body>

<div id="header">SPC WATCH</div>
<div id="clock"></div>
<div id="watchNumber">WATCH #--</div>

<div id="mapContainer">
<div id="pending">Loading Watch Data…</div>
</div>

<script>

const ROTATE_MS = 5000;

function updateClock(){
    const now = new Date();
    document.getElementById("clock").textContent =
        now.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}

setInterval(updateClock,1000);
updateClock();

async function loadWatch(){

    try{

        const r = await fetch("http://localhost:3000/api/spc-watches");
        const j = await r.json();

        if(!j.watches || j.watches.length === 0){
            document.getElementById("pending").textContent =
                "No Active SPC Watches";
            return;
        }

        const watch = j.watches[0];

        document.getElementById("watchNumber").textContent =
            "WATCH #" + watch;

        const img = document.createElement("img");

        img.src = "https://www.spc.noaa.gov/products/watch/wou" + watch + "_radar.gif";

        img.onload = () => {
            const c = document.getElementById("mapContainer");
            c.innerHTML = "";
            c.appendChild(img);
        };

        img.onerror = () => {
            document.getElementById("pending").textContent =
                "Storm Prediction Center Map Will Be Available Shortly";
        };

    }catch(e){

        document.getElementById("pending").textContent =
            "Unable to Load Watch Data";

    }

}

loadWatch();

function rotate(){

    const path = window.location.pathname.toLowerCase();

    if(path.endsWith("subscreen-watch.html")){
        window.location.href = "subscreen-forecast.html";
    }

}

setTimeout(rotate, ROTATE_MS);

</script>

</body>
</html>
